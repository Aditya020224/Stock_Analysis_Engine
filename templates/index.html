<!DOCTYPE html>
<html>
<head>
    <title>StockPulse AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Inter', sans-serif; }
        .container { max-width: 600px; margin-top: 100px; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 30px; }
        .btn-primary { background-color: #238636; border: none; }
        .btn-primary:hover { background-color: #2ea043; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="mb-4">StockPulse <span class="text-primary">AI</span></h1>
        <div class="card shadow">
            <form action="/predict" method="post">
                <input type="text" name="ticker" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Enter Ticker (e.g. TSLA, AAPL, TCS.NS)" required>
                <button type="submit" class="btn btn-primary w-100">Predict Tomorrow's Price</button>
            </form>
            
            {% if prediction %}
                <div class="mt-4">
                    <h4 class="text-secondary">Predicted Price for {{ ticker }}:</h4>
                    <h2 class="text-success">${{ prediction }}</h2>
                </div>
            {% endif %}

            {% if error %}
                <div class="alert alert-danger mt-3">{{ error }}</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
